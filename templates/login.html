{% extends "layout.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<section class="form-page">
  <div class="form-card">
    <h1 class="form-title">Connexion</h1>
    <p class="form-subtitle">Accédez à votre espace bénévole</p>

    <form id="login-form" method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-name">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="login-name" name="name" placeholder="Votre nom"
          autocomplete="username" value="{{ request.form.get('name', '') }}">
        <p class="form-error" id="login-name-error"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Mot de passe</label>
        <input class="form-input" type="password" id="login-password" name="password" placeholder="••••••••"
          autocomplete="current-password">
        <p class="form-error" id="login-password-error"></p>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-submit">
        connexion
      </button>
    </form>

    <p class="form-footer">
      Pas encore de compte ?
      <a href="{{ url_for('register') }}">Créer un compte</a>
    </p>
  </div>
</section>
{% endblock %}
